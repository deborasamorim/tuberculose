<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Epidemiológico - Gerência de Tuberculose</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary-green: #2ecc71; 
            --primary-blue: #3498db; 
            --bg-dark: #0f172a; 
            --panel-bg: rgba(255, 255, 255, 0.03); 
            --border-light: rgba(255, 255, 255, 0.1); 
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #fff; margin: 0; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* Cabeçalho Identificado (Mesmo do Index) */
        .main-header { position: relative; height: 350px; overflow: hidden; display: flex; align-items: center; justify-content: center; text-align: center; }
        .header-video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; z-index: -1; transform: translate(-50%, -50%); object-fit: cover; }
        .header-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); }
        .header-content { position: relative; z-index: 1; }
        
        .brand h1 { margin: 0; font-size: 2rem; color: #fff; } /* Escrita em branco */
        .brand p { margin: 5px 0; color: #ccc; }
        .brand span { color: var(--primary-green); font-weight: bold; }

        .nav-menu { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        .nav-menu a { color: #fff; text-decoration: none; font-size: 0.9rem; opacity: 0.8; transition: 0.3s; padding: 5px 10px; }
        .nav-menu a:hover, .nav-menu a.active { opacity: 1; border-bottom: 2px solid var(--primary-green); }

        /* Estilos do Dashboard */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 40px 0; }
        .stat-card { background: var(--panel-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-light); text-align: center; }
        .stat-card h3 { font-size: 0.8rem; color: #94a3b8; margin: 0 0 10px 0; text-transform: uppercase; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; color: #fff; } /* Escrita em branco */

        .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 30px; margin-bottom: 50px; }
        .chart-panel { background: var(--panel-bg); padding: 25px; border-radius: 15px; border: 1px solid var(--border-light); }
        .chart-panel h2 { font-size: 1.1rem; margin-bottom: 20px; color: #fff; }
        
        canvas { max-width: 100%; }

        @media (max-width: 768px) {
            .charts-container { grid-template-columns: 1fr; }
            .main-header { height: 250px; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <video autoplay muted loop playsinline class="header-video">
            <source src="pulmao2.mp4" type="video/mp4">
        </video>
        <div class="header-overlay"></div>
        <div class="header-content container">
            <div class="brand">
                <h1>Monitoramento Epidemiológico</h1>
                <p>Gerência Técnica Municipal de Tuberculose - <span>Campo Grande, MS</span></p>
            </div>
            <nav class="nav-menu">
                <a href="index.html">Início</a>
                <a href="impressos.html">Impressos</a>
                <a href="dashboard.html" class="active">Dashboard Tuberculose</a>
                <a href="contato.html">Contato Técnico</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="stats-grid">
            <div class="stat-card">
                <h3>Casos Notificados</h3>
                <div class="value">42</div>
            </div>
            <div class="stat-card">
                <h3>Em Tratamento</h3>
                <div class="value">215</div>
            </div>
            <div class="stat-card">
                <h3>Taxa de Cura</h3>
                <div class="value">82%</div>
            </div>
            <div class="stat-card">
                <h3>Abandono</h3>
                <div class="value">8.4%</div>
            </div>
        </section>

        <section class="charts-container">
            <div class="chart-panel">
                <h2>Incidência Mensal de Casos</h2>
                <canvas id="lineChart"></canvas>
            </div>

            <div class="chart-panel">
                <h2>Desfecho de Tratamento</h2>
                <canvas id="pieChart"></canvas>
            </div>
        </section>
    </main>

    <script>
        // Gráfico de Linha (Azul)
        const ctxLine = document.getElementById('lineChart').getContext('2d');
        new Chart(ctxLine, {
            type: 'line',
            data: {
                labels: ['Out', 'Nov', 'Dez', 'Jan', 'Fev', 'Mar'],
                datasets: [{
                    label: 'Notificações',
                    data: [35, 38, 30, 45, 42, 50],
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52, 152, 219, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: '#fff' } } },
                scales: {
                    y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    x: { ticks: { color: '#94a3b8' }, grid: { display: false } }
                }
            }
        });

        // Gráfico de Pizza (Cores diversificadas)
        const ctxPie = document.getElementById('pieChart').getContext('2d');
        new Chart(ctxPie, {
            type: 'doughnut',
            data: {
                labels: ['Cura', 'Abandono', 'Óbito', 'Transferência'],
                datasets: [{
                    data: [82, 8, 3, 7],
                    backgroundColor: ['#2ecc71', '#e74c3c', '#f1c40f', '#3498db'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: '#fff', padding: 20 }
                    }
                }
            }
        });
    </script>
</body>
</html>
